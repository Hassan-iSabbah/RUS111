    <div class="dictionary">
        <h1>Russian Dictionary</h1>
        <input type="text" id="search" placeholder="Search for a word...">
        <div id="word-list">
        </div>
    </div>

    <script src="js/main.js?v=25"></script>
    <script src="js/dictionary.js"></script>
    <script>
        jQuery(document).ready(function(){
            jQuery('#search').on('input', function(){
                var query = jQuery(this).val().toLowerCase();
                jQuery('.word-item').each(function(){
                    var word = jQuery(this).data('word').toLowerCase();
                    if (word.includes(query)) {
                        jQuery(this).show();
                    } else {
                        jQuery(this).hide();
                    }
                });
            });
        });
    </script>
